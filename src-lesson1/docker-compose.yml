services:
  postgres:
    image: postgres:16
    container_name: lesson1-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bench
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - shared_buffers=256MB
      - -c
      - max_connections=600
      - -c
      - wal_level=logical
      - -c
      - synchronous_commit=on
      - -c
      - log_checkpoints=on
      - -c
      - log_lock_waits=on
      - -c
      - deadlock_timeout=1s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d bench"]
      interval: 3s
      timeout: 2s
      retries: 10

volumes:
  pgdata:
